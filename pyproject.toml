[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# Note: Import sorting (I) is handled by isort, not ruff
select = ["E", "F", "W", "UP"]
ignore = [
    "E501",   # Line too long (handled by formatter)
    "E712",   # Comparison to True/False (SQLAlchemy requires this)
    "E722",   # Bare except (temporary, for migration)
    "E402",   # Module import not at top (some files need conditional imports)
    "F401",   # Unused imports (temporary, for migration)
    "F823",   # Variable referenced before assignment (false positive in some cases)
    "F841",   # Local variable assigned but never used (temporary)
    "UP008",  # super() without arguments (Python 2 style, but works)
    "W291",   # Trailing whitespace (cosmetic)
    "W293",   # Blank line contains whitespace (cosmetic)
]
# Naming conventions (N) removed for migration - existing code uses different conventions

[tool.black]
line-length = 100
target-version = ['py311']

[tool.isort]
profile = "black"
line_length = 100
