# =============================================================================
# Gastropilot Docker Stack
# Deploy with: docker stack deploy -c gastropilot-stack.yml gastropilot-{env}
# =============================================================================

version: "3.8"

services:
  # ===========================================
  # Frontend (Next.js)
  # ===========================================
  frontend:
    image: ghcr.io/duhrkah/gastropilot-frontend:main
    networks:
      - gastropilot-network
      - traefik-public
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${API_URL}
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.${STACK_NAME}-frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
        - "traefik.http.routers.${STACK_NAME}-frontend.entrypoints=websecure"
        - "traefik.http.routers.${STACK_NAME}-frontend.tls.certresolver=letsencrypt"
        - "traefik.http.services.${STACK_NAME}-frontend.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================
  # Backend (FastAPI)
  # ===========================================
  backend:
    image: ghcr.io/duhrkah/gastropilot-backend:main
    networks:
      - gastropilot-network
      - traefik-public
    environment:
      - ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - SENTRY_DSN=${SENTRY_DSN:-}
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.${STACK_NAME}-backend.rule=Host(`${BACKEND_DOMAIN}`)"
        - "traefik.http.routers.${STACK_NAME}-backend.entrypoints=websecure"
        - "traefik.http.routers.${STACK_NAME}-backend.tls.certresolver=letsencrypt"
        - "traefik.http.services.${STACK_NAME}-backend.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:16-alpine
    networks:
      - gastropilot-network
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Redis (optional, for caching/sessions)
  # ===========================================
  redis:
    image: redis:7-alpine
    networks:
      - gastropilot-network
    volumes:
      - redis-data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  gastropilot-network:
    external: true
  traefik-public:
    external: true

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
