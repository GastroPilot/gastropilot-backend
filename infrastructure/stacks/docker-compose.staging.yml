# =============================================================================
# Gastropilot Staging - Simple Docker Compose (No Swarm)
# For initial deployment and testing
# =============================================================================

version: "3.8"

services:
  frontend:
    image: ghcr.io/duhrkah/gastropilot-frontend:main
    container_name: gastropilot-staging-frontend
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api-staging.gastropilot.app
    networks:
      - gastropilot-staging
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    image: ghcr.io/duhrkah/gastropilot-backend:main
    container_name: gastropilot-staging-backend
    restart: unless-stopped
    ports:
      - "8003:8000"
    environment:
      - ENV=staging
      - DATABASE_URL=postgresql://gastropilot:${DB_PASSWORD}@postgres:5432/gastropilot_staging
      - JWT_SECRET=${JWT_SECRET}
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=https://staging.gastropilot.app
    networks:
      - gastropilot-staging
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: gastropilot-staging-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=gastropilot
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=gastropilot_staging
    volumes:
      - postgres-staging-data:/var/lib/postgresql/data
    networks:
      - gastropilot-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gastropilot -d gastropilot_staging"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  gastropilot-staging:
    driver: bridge

volumes:
  postgres-staging-data:
