name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - 'packages/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - 'Dockerfile'
      - '.github/workflows/ci-cd.yml'
      - '!**/*.md'
      - '!**/*.mdx'
      - '!docs/**'
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'packages/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - 'Dockerfile'
      - '.github/workflows/ci-cd.yml'
      - '!**/*.md'
      - '!**/*.mdx'
      - '!docs/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag'
        required: true
        type: choice
        options:
          - test
          - staging
          - demo

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'
  DOCKERHUB_ORG: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ============================================
  # CI – runs on every push and PR
  # ============================================

  lint:
    name: Lint (disabled)
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install lint tools
        run: pip install ruff black isort

      - name: Run Ruff
        run: ruff check services/ packages/

      - name: Check formatting (Black)
        run: black --check services/ packages/

      - name: Check import sorting (isort)
        run: isort --check-only services/ packages/

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve changed services
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          ALL_SERVICES='["core","orders","ai","notifications"]'

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "services=${ALL_SERVICES}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_BRANCH="${BASE_REF:-main}"
            git fetch --no-tags --depth=1 origin "${BASE_BRANCH}"
            CHANGED_FILES="$(git diff --name-only "origin/${BASE_BRANCH}"...HEAD || true)"
          else
            if [ -n "${BEFORE_SHA:-}" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
              CHANGED_FILES="$(git diff --name-only "${BEFORE_SHA}"...HEAD || true)"
            else
              CHANGED_FILES="$(git show --pretty='' --name-only HEAD || true)"
            fi
          fi

          if [ -z "${CHANGED_FILES}" ]; then
            echo "services=${ALL_SERVICES}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s\n' "${CHANGED_FILES}" | grep -Eq '^(packages/|tests/|pyproject.toml$|requirements.*\.txt$|Dockerfile$|\.github/workflows/ci-cd\.yml$)'; then
            echo "services=${ALL_SERVICES}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SERVICES=()
          for SERVICE in core orders ai notifications; do
            if printf '%s\n' "${CHANGED_FILES}" | grep -Eq "^services/${SERVICE}/"; then
              SERVICES+=("\"${SERVICE}\"")
            fi
          done

          if [ "${#SERVICES[@]}" -eq 0 ]; then
            echo "services=${ALL_SERVICES}" >> "$GITHUB_OUTPUT"
          else
            MATRIX="[$(IFS=,; echo "${SERVICES[*]}")]"
            echo "services=${MATRIX}" >> "$GITHUB_OUTPUT"
          fi

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [detect-changes]
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install service dependencies
        run: |
          pip install -e services/${{ matrix.service }}/
          if [ -d "packages" ]; then
            export PYTHONPATH=$PWD/packages:$PYTHONPATH
          fi

      - name: Verify application imports
        env:
          PYTHONPATH: ${{ github.workspace }}/packages
        run: python -c "from app.main import app; print('${{ matrix.service }} OK')"
        working-directory: services/${{ matrix.service }}

  # ============================================
  # CD – Docker Build & Push (4 Microservices)
  # ============================================

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [detect-changes, build-check]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=test" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine RC version
        id: rc
        run: |
          VERSION=$(python3 -c "
          try:
              import tomllib
              with open('services/${{ matrix.service }}/pyproject.toml', 'rb') as f:
                  print(tomllib.load(f)['project']['version'])
          except Exception:
              print('2.0.0')
          ")
          RC_VERSION="${VERSION}-rc.${{ github.run_number }}"
          echo "rc_version=${RC_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create RC tag
        env:
          RC_VERSION: ${{ steps.rc.outputs.rc_version }}
          SERVICE: ${{ matrix.service }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${RC_VERSION}-${SERVICE}" -m "RC ${RC_VERSION} (${SERVICE})" || true
          git push origin "v${RC_VERSION}-${SERVICE}" || true
      
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-${{ matrix.service }}:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-${{ matrix.service }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
