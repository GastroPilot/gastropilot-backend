name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - 'feature/**'
      - 'feat/**'
      - 'fix/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag'
        required: true
        type: choice
        options:
          - test

env:
  PYTHON_VERSION: '3.11'
  DOCKERHUB_ORG: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ============================================
  # CI – runs on every push and PR
  # ============================================

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install lint tools
        run: pip install ruff black isort

      - name: Run Ruff
        run: ruff check services/ packages/

      - name: Check formatting (Black)
        run: black --check services/ packages/

      - name: Check import sorting (isort)
        run: isort --check-only services/ packages/

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [core, orders, ai, notifications]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install service dependencies
        run: |
          pip install -e services/${{ matrix.service }}/
          if [ -d "packages" ]; then
            export PYTHONPATH=$PWD/packages:$PYTHONPATH
          fi

      - name: Verify application imports
        env:
          PYTHONPATH: ${{ github.workspace }}/packages
        run: python -c "from app.main import app; print('${{ matrix.service }} OK')"
        working-directory: services/${{ matrix.service }}

  # ============================================
  # CD – Docker Build & Push (4 Microservices)
  # ============================================

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint, build-check]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - service: core
            image: gastropilot-core
          - service: orders
            image: gastropilot-orders
          - service: ai
            image: gastropilot-ai
          - service: notifications
            image: gastropilot-notifications
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            echo "tag=$INPUT_TAG" >> $GITHUB_OUTPUT
          else
            echo "tag=test" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
