name: Detect Environment and Deploy Backend

on:
  push:
    branches:
      - main
      - demo
      - staging
      - test
    paths-ignore:
      - 'README.md'
      - 'LICENSE.md'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - production
          - demo
          - staging
          - test

jobs:
  detect-environment:
    name: Detect Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      env_upper: ${{ steps.set-env.outputs.env_upper }}
      port: ${{ steps.set-env.outputs.port }}
      screen_session: ${{ steps.set-env.outputs.screen_session }}
    steps:
      - name: Set environment from branch or input
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            BRANCH="${{ github.ref_name }}"
            case "$BRANCH" in
              main|production)
                ENV="production"
                ;;
              demo)
                ENV="demo"
                ;;
              staging)
                ENV="staging"
                ;;
              test)
                ENV="test"
                ;;
              *)
                echo "ERROR: Unknown branch: $BRANCH"
                exit 1
                ;;
            esac
          fi
          
          # Set environment-specific values (only PORT and SCREEN_SESSION, 
          # DEPLOY_PATH and HEALTH_URL come from environment secrets)
          case "$ENV" in
            production)
              PORT="8000"
              SCREEN_SESSION="app-production"
              ;;
            demo)
              PORT="8001"
              SCREEN_SESSION="app-demo"
              ;;
            staging)
              PORT="8002"
              SCREEN_SESSION="app-staging"
              ;;
            test)
              PORT="8003"
              SCREEN_SESSION="app-test"
              ;;
            *)
              echo "ERROR: Unknown environment: $ENV"
              exit 1
              ;;
          esac
          
          ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')
          
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "env_upper=$ENV_UPPER" >> $GITHUB_OUTPUT
          echo "port=$PORT" >> $GITHUB_OUTPUT
          echo "screen_session=$SCREEN_SESSION" >> $GITHUB_OUTPUT
          
          echo "✓ Detected environment: $ENV"
          echo "  Port: $PORT"
          echo "  Screen Session: $SCREEN_SESSION"

  deploy:
    name: Deploy to ${{ needs.detect-environment.outputs.environment }}
    needs: detect-environment
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-environment.outputs.environment }}
    
    steps:
      - name: Debug - Show changed files
        run: |
          echo "Git commit info:"
          git log -1 --name-only --pretty=format:"Commit: %h - %s" || echo "No commit info"
          echo ""
          echo "Changed files in this push:"
          git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "Cannot determine changed files"
      
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set environment variables
        id: set-vars
        run: |
          ENV="${{ needs.detect-environment.outputs.environment }}"
          ENV_UPPER="${{ needs.detect-environment.outputs.env_upper }}"
          PORT="${{ needs.detect-environment.outputs.port }}"
          SCREEN_SESSION="${{ needs.detect-environment.outputs.screen_session }}"
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
          HEALTH_URL="${{ secrets.HEALTH_URL }}"
          
          echo "ENV=$ENV" >> $GITHUB_ENV
          echo "ENV_UPPER=$ENV_UPPER" >> $GITHUB_ENV
          echo "PORT=$PORT" >> $GITHUB_ENV
          echo "SCREEN_SESSION=$SCREEN_SESSION" >> $GITHUB_ENV
          echo "DEPLOY_PATH=$DEPLOY_PATH" >> $GITHUB_ENV
          echo "HEALTH_URL=$HEALTH_URL" >> $GITHUB_ENV
          
          echo "✓ Environment variables set:"
          echo "  ENV: $ENV"
          echo "  PORT: $PORT"
          echo "  SCREEN_SESSION: $SCREEN_SESSION"
          echo "  DEPLOY_PATH: $DEPLOY_PATH"
          echo "  HEALTH_URL: $HEALTH_URL"

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r app deploy/
          cp requirements.txt deploy/
          cp -r scripts deploy/ 2>/dev/null || true
          # Entferne Python-Cache-Dateien aus dem Deployment-Paket
          find deploy -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find deploy -type f -name "*.pyc" -delete 2>/dev/null || true
          find deploy -type f -name "*.pyo" -delete 2>/dev/null || true
          tar -czf backend-${ENV}.tar.gz deploy/

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Create .env file
        run: |
          echo "${{ secrets.BACKEND_ENV }}" > .env
          echo "✓ .env file created (content length: $(wc -c < .env) bytes)"

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          scp -o StrictHostKeyChecking=no backend-${ENV}.tar.gz ${SSH_USER}@${SSH_HOST}:/tmp/
          scp -o StrictHostKeyChecking=no .env ${SSH_USER}@${SSH_HOST}:/tmp/backend-${ENV}.env
          
          ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} bash << EOF
            set -e
            export DEPLOY_PATH="${DEPLOY_PATH}"
            export SCREEN_SESSION="${SCREEN_SESSION}"
            export PORT="${PORT}"
            
            echo "=== Deployment Start ==="
            echo "DEPLOY_PATH: \$DEPLOY_PATH"
            echo "Current directory: \$(pwd)"
            
            # Erstelle Verzeichnis falls es nicht existiert
            mkdir -p "\$DEPLOY_PATH"
            cd "\$DEPLOY_PATH"
            echo "Changed to: \$(pwd)"
            
            # Erstelle venv falls es nicht existiert oder beschädigt ist (vor dem Extrahieren)
            if [ ! -d "venv" ] || [ ! -f "venv/bin/activate" ]; then
              if [ -d "venv" ]; then
                echo "venv exists but is incomplete, removing and recreating..."
                rm -rf venv
              fi
              echo "Creating venv..."
              python3 -m venv venv || {
                echo "ERROR: Failed to create venv"
                exit 1
              }
            else
              echo "venv already exists and is valid"
            fi
            
            # Prüfe ob venv existiert und vollständig ist
            if [ ! -d "venv" ] || [ ! -f "venv/bin/activate" ]; then
              echo "ERROR: venv directory or activate script does not exist after creation attempt"
              exit 1
            fi
            
            echo "venv verified: \$(ls -la venv/bin/activate)"
            
            # Extrahiere Deployment-Paket (überschreibt venv nicht, da es nicht im Paket ist)
            echo "Extracting deployment package..."
            tar -xzf /tmp/backend-${ENV}.tar.gz
            
            # Lösche Python-Cache vor dem Deployment
            echo "Cleaning Python cache..."
            find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
            find . -type f -name "*.pyc" -delete 2>/dev/null || true
            find . -type f -name "*.pyo" -delete 2>/dev/null || true
            
            # Lösche alte Anwendungsdateien (aber nicht venv, logs, etc.)
            echo "Removing old application files..."
            if [ -d "app" ]; then
              rm -rf app
              echo "Removed old app/ directory"
            fi
            if [ -d "scripts" ]; then
              rm -rf scripts
              echo "Removed old scripts/ directory"
            fi
            if [ -f "requirements.txt" ]; then
              rm -f requirements.txt
              echo "Removed old requirements.txt"
            fi
            
            # Kopiere neue Dateien aus deploy/ ins aktuelle Verzeichnis
            if [ -d "deploy" ]; then
              echo "Copying new files from deploy/ directory..."
              # Kopiere alle Dateien und Verzeichnisse, außer venv
              for item in deploy/* deploy/.[!.]*; do
                if [ -e "\$item" ] && [ "\$(basename \$item)" != "venv" ]; then
                  if [ -d "\$item" ]; then
                    cp -r "\$item" . 2>/dev/null || true
                    echo "Copied directory: \$(basename \$item)"
                  else
                    cp "\$item" . 2>/dev/null || true
                    echo "Copied file: \$(basename \$item)"
                  fi
                fi
              done
              rm -rf deploy
              echo "Removed deploy/ directory"
            fi
            
            # Lösche Python-Cache nach dem Deployment
            echo "Cleaning Python cache after deployment..."
            find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
            find . -type f -name "*.pyc" -delete 2>/dev/null || true
            find . -type f -name "*.pyo" -delete 2>/dev/null || true
            
            # Debug: Zeige was jetzt im Verzeichnis ist
            echo "Current directory contents after deployment:"
            ls -la
            if [ -d "app" ]; then
              echo "app/ directory exists with:"
              ls -la app/ | head -20
            fi
            
            # Prüfe nochmal ob venv existiert
            if [ ! -f "venv/bin/activate" ]; then
              echo "ERROR: venv/bin/activate not found after file move"
              echo "Current directory contents:"
              ls -la
              exit 1
            fi
            
            # Übertrage .env Datei
            if [ -f "/tmp/backend-${ENV}.env" ]; then
              echo "Copying .env file..."
              cp /tmp/backend-${ENV}.env .env
              chmod 600 .env
              echo "✓ .env file copied and secured"
              rm -f /tmp/backend-${ENV}.env
            else
              echo "WARNING: .env file not found at /tmp/backend-${ENV}.env"
            fi
            
            # Aktiviere venv
            echo "Activating venv..."
            source venv/bin/activate
            
            pip install --upgrade pip
            pip install -r requirements.txt
            
            # Stoppe bestehende Screen-Session und alle uvicorn-Prozesse
            echo "Stopping existing processes..."
            if screen -list | grep -q "\$SCREEN_SESSION"; then
              echo "Stopping existing screen session: \$SCREEN_SESSION"
              screen -S "\$SCREEN_SESSION" -X stuff \$'\003' || true
              sleep 3
              screen -S "\$SCREEN_SESSION" -X quit || true
              sleep 2
            fi
            
            # Stoppe alle uvicorn-Prozesse auf Port (falls noch laufend)
            echo "Killing any remaining uvicorn processes..."
            pkill -9 -f "uvicorn.*app.main:app.*\$PORT" || true
            pkill -9 -f "uvicorn.*\$PORT" || true
            sleep 3
            
            # Prüfe ob Port noch belegt ist
            if lsof -ti:\$PORT > /dev/null 2>&1; then
              echo "Port \$PORT still in use, killing process..."
              lsof -ti:\$PORT | xargs kill -9 || true
              sleep 2
            fi
            
            # Prüfe nochmal ob Port frei ist
            if lsof -ti:\$PORT > /dev/null 2>&1; then
              echo "WARNING: Port \$PORT is still in use after cleanup attempts"
            else
              echo "✓ Port \$PORT is free"
            fi
            
            # Verifiziere dass app/main.py existiert und aktuell ist
            if [ ! -f "app/main.py" ]; then
              echo "ERROR: app/main.py not found after deployment!"
              exit 1
            fi
            echo "✓ app/main.py exists: \$(ls -lh app/main.py)"
            
            # Starte Server in Screen-Session
            echo "Starting server in screen session..."
            echo "Environment: ${ENV}"
            echo "Port: \$PORT"
            echo "Deploy Path: \$DEPLOY_PATH"
            
            # Erstelle Log-Datei für Server-Output
            LOG_FILE="\$DEPLOY_PATH/server.log"
            touch "\$LOG_FILE"
            
            # Starte Screen-Session mit besserem Error-Handling und Logging
            screen -dmS "\$SCREEN_SESSION" bash -c "
              exec > >(tee -a \$LOG_FILE)
              exec 2>&1
              echo '=== Starting server ==='
              echo \"Environment: ${ENV}\"
              echo \"Port: \$PORT\"
              echo \"Deploy Path: \$DEPLOY_PATH\"
              echo \"Working directory: \$(pwd)\"
              
              # Aktiviere venv
              echo 'Activating venv...'
              source venv/bin/activate || {
                echo 'ERROR: Failed to activate venv'
                exit 1
              }
              
              # Wechsle ins Deploy-Verzeichnis
              echo 'Changing to deploy directory...'
              cd \$DEPLOY_PATH || {
                echo \"ERROR: Failed to change to directory: \$DEPLOY_PATH\"
                exit 1
              }
              echo \"Current directory: \$(pwd)\"
              
              # Setze Environment-Variablen
              export PYTHONDONTWRITEBYTECODE=1
              export PYTHONUNBUFFERED=1
              export ENV=${ENV}
              
              # Prüfe ob app/main.py existiert
              if [ ! -f \"app/main.py\" ]; then
                echo \"ERROR: app/main.py not found in \$(pwd)\"
                ls -la app/ || echo 'app/ directory does not exist'
                exit 1
              fi
              
              # Python-Import-Cache invalidieren
              echo 'Invalidating Python import cache...'
              python -c 'import sys; sys.path.insert(0, \"\$DEPLOY_PATH\"); import importlib; importlib.invalidate_caches()' || {
                echo 'WARNING: Failed to invalidate import cache, continuing anyway...'
              }
              
              # Starte uvicorn
              echo 'Starting uvicorn server...'
              uvicorn app.main:app --host 0.0.0.0 --port \$PORT --no-access-log || {
                echo 'ERROR: uvicorn failed to start'
                exit 1
              }
            " || {
              echo "ERROR: Failed to create screen session"
              exit 1
            }
            
            # Warte kurz und prüfe ob Screen-Session läuft
            sleep 5
            if screen -list | grep -q "\$SCREEN_SESSION"; then
              echo "✓ Screen session started successfully"
              
              # Zeige die letzten Zeilen der Screen-Session für Debugging
              screen -S "\$SCREEN_SESSION" -X hardcopy /tmp/screen_output.txt 2>/dev/null || true
              if [ -f /tmp/screen_output.txt ]; then
                echo "Screen session output (last 30 lines):"
                tail -30 /tmp/screen_output.txt || true
                rm -f /tmp/screen_output.txt
              fi
              
              # Zeige auch die Log-Datei, falls vorhanden
              if [ -f "\$LOG_FILE" ]; then
                echo "Server log file (last 30 lines):"
                tail -30 "\$LOG_FILE" || true
              fi
              
              # Prüfe ob der Server läuft
              sleep 2
              if lsof -ti:\$PORT > /dev/null 2>&1; then
                echo "✓ Server is listening on port \$PORT"
              else
                echo "WARNING: Port \$PORT is not in use yet"
              fi
            else
              echo "ERROR: Screen session failed to start"
              echo "Checking for any error messages..."
              screen -list || true
              
              # Zeige die Log-Datei, falls vorhanden
              if [ -f "\$LOG_FILE" ]; then
                echo "Server log file (full content):"
                cat "\$LOG_FILE" || true
              else
                echo "No log file found at \$LOG_FILE"
              fi
              
              # Prüfe ob uvicorn-Prozesse laufen
              echo "Checking for uvicorn processes..."
              ps aux | grep -E 'uvicorn.*\$PORT' | grep -v grep || echo "No uvicorn processes found"
              
              exit 1
            fi
            
            rm -f /tmp/backend-${ENV}.tar.gz
            echo "Deployment completed successfully"
          EOF

      - name: Health check
        run: |
          echo "Waiting for server to start..."
          sleep 15
          
          echo "Performing health check on ${HEALTH_URL}..."
          HEALTH_CHECK_PASSED=false
          
          for i in {1..10}; do
            echo "Health check attempt $i/10..."
            HEALTH_CHECK_RESULT=$(curl -f -s -w '\nHTTP Status: %{http_code}\n' --max-time 10 --connect-timeout 5 ${HEALTH_URL} 2>&1 || echo "error")
            
            if echo "$HEALTH_CHECK_RESULT" | grep -q "HTTP Status: 200"; then
              echo "✓ Health check passed"
              echo "Response:"
              echo "$HEALTH_CHECK_RESULT"
              HEALTH_CHECK_PASSED=true
              break
            else
              if [ $i -lt 10 ]; then
                echo "Health check failed, retrying in 3 seconds..."
                echo "Response: $HEALTH_CHECK_RESULT"
                sleep 3
              fi
            fi
          done
          
          if [ "$HEALTH_CHECK_PASSED" = false ]; then
            echo "ERROR: Health check failed after 10 attempts"
            echo "Last response:"
            echo "$HEALTH_CHECK_RESULT"
            exit 1
          fi

  notify-slack:
    name: Notify Slack
    needs: [detect-environment, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check deployment status
        id: check-status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Prüfe ob Slack Webhook URL gesetzt ist
          if [ -z "$SLACK_WEBHOOK_URL" ] || [ "$SLACK_WEBHOOK_URL" == "" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping Slack notification"
            exit 0
          fi
          
          ENV="${{ needs.detect-environment.outputs.environment }}"
          ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')
          STATUS="${{ steps.check-status.outputs.status }}"
          EMOJI="${{ steps.check-status.outputs.emoji }}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | sed 's/"/\\"/g' | sed 's/`/\\`/g')
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHORT=$(echo "$COMMIT_SHA" | cut -c1-7)
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PORT="${{ needs.detect-environment.outputs.port }}"
          
          # Escape Commit-Message für JSON
          ESCAPED_COMMIT_MSG=$(echo "$COMMIT_MSG" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g' | sed 's/$/\\n/' | tr -d '\n' | sed 's/\\n$//')
          
          # Erstelle Slack-Nachricht
          PAYLOAD=$(cat <<JSON
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "${EMOJI} Backend Deployment ${ENV_UPPER}"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Status:*\n${STATUS}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Environment:*\n${ENV}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n${BRANCH}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Port:*\n${PORT}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Commit:*\n<${WORKFLOW_URL}|${COMMIT_SHORT}>"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Triggered by:*\n${ACTOR}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Commit Message:*\n\`\`\`${ESCAPED_COMMIT_MSG}\`\`\`"
                }
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "<${WORKFLOW_URL}|View Workflow Run>"
                  }
                ]
              }
            ]
          }
          JSON
          )
          
          curl -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"
