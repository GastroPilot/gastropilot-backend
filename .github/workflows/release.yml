name: Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bump2version
        run: pip install bump2version

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release
        id: release
        run: |
          # Get current version from VERSION file or create one
          if [ -f "VERSION" ]; then
            CURRENT_VERSION=$(cat VERSION)
          else
            CURRENT_VERSION="0.0.0"
            echo "$CURRENT_VERSION" > VERSION
            git add VERSION
            git commit -m "chore: add VERSION file"
          fi

          # Calculate new version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          case "${{ github.event.inputs.release-type }}" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
          esac

          echo "Updating version: $CURRENT_VERSION -> $NEW_VERSION"
          echo "$NEW_VERSION" > VERSION

          # Create changelog entry
          DATE=$(date +%Y-%m-%d)
          CHANGELOG_ENTRY="## [$NEW_VERSION] - $DATE\n\n### Changes\n\n- Release $NEW_VERSION\n"

          if [ -f "CHANGELOG.md" ]; then
            # Insert new entry after the header
            sed -i "s/# Changelog/# Changelog\n\n$CHANGELOG_ENTRY/" CHANGELOG.md
          else
            echo -e "# Changelog\n\n$CHANGELOG_ENTRY" > CHANGELOG.md
          fi

          # Commit and tag
          git add VERSION CHANGELOG.md
          git commit -m "chore(release): $NEW_VERSION"
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Released version: $NEW_VERSION"

      - name: Push changes and tags
        run: |
          git push --follow-tags origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.release.outputs.version }}
          name: v${{ steps.release.outputs.version }}
          body: |
            ## Changes

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ## Docker Image

            ```bash
            docker pull ghcr.io/${{ github.repository }}:v${{ steps.release.outputs.version }}
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Docker build for release
        run: |
          echo "Docker build will be triggered by the tag push"
          echo "Image will be tagged as: v${{ steps.release.outputs.version }}"
