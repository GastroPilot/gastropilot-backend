version: 2
updates:
  # Core Service
  - package-ecosystem: "pip"
    directory: "/services/core"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "core"

  # Orders Service
  - package-ecosystem: "pip"
    directory: "/services/orders"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "orders"

  # AI Service
  - package-ecosystem: "pip"
    directory: "/services/ai"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ai"

  # Notifications Service
  - package-ecosystem: "pip"
    directory: "/services/notifications"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "notifications"
